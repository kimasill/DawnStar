syntax = "proto3";

package Protocol;
import "google/protobuf/timestamp.proto";
option csharp_namespace = "Google.Protobuf.Protocol";

enum MsgId {
  S_ENTER_GAME = 0;
  S_LEAVE_GAME = 1;
  S_SPAWN = 2;
  S_DESPAWN = 3;
  C_MOVE = 4;
  S_MOVE = 5;
  C_SKILL = 6;
  S_SKILL = 7;
  S_CHANGE_HP = 8;
  S_DIE = 9;
  S_CONNECTED = 10;
  C_LOGIN = 11;
  S_LOGIN = 12;  
  C_ENTER_GAME = 13;
  C_CREATE_PLAYER = 14;
  S_CREATE_PLAYER = 15;
  S_ITEM_LIST = 16;
  S_ADD_ITEM = 17;
  C_EQUIP_ITEM = 18;
  S_EQUIP_ITEM = 19;
  S_CHANGE_STAT = 20;
  S_PING = 21;
  C_PONG = 22;
  S_TUTORIAL = 23; 
  C_MAP_CHANGE = 24;
  S_MAP_CHANGE = 25;
  S_START_QUEST = 26;
  C_START_QUEST = 27;
  S_QUEST_COMPLETE = 28;
  C_QUEST_COMPLETE = 29;
  C_BUY_ITEM = 30;
  S_SHOP_LIST = 31;
  C_REQUEST_SHOP = 32;
  S_BUY_ITEM = 33;
  S_CHANGE_POSITION = 34;  
  C_CHANGE_POSITION = 35;
  C_REMOVE_ITEM = 36;
}
enum CreatureState{
  IDLE = 0;
  MOVING = 1;
  SKILL = 2;
  DEAD = 3;
}

enum MoveDir{
  UP = 0;
  DOWN = 1;
  LEFT = 2;
  RIGHT = 3;
}

enum LookDir{
	LOOK_LEFT = 0;
	LOOK_RIGHT = 1;
}

enum GameObjectType{
	NONE = 0;
	PLAYER = 1;
	MONSTER = 2;
	PROJECTILE = 3;
	NPC = 4;
}

enum SkillType{
	SKILL_NONE = 0;
	SKILL_ATTACK = 1;
	SKILL_PROJECTILE = 2;
}

enum RewardType{
	REWARD_EXP = 0;
	REWARD_ITEM = 1;
	REWARD_GOLD = 2;
}

enum PlayerServerState{
	SERVER_STATE_LOGIN = 0;
	SERVER_STATE_LOBBY = 1;
	SERVER_STATE_SINGLE = 2;
	SERVER_STATE_GAME = 3;
}

enum ItemType
{
	ITEM_TYPE_NONE = 0;
	ITEM_TYPE_WEAPON = 1;
	ITEM_TYPE_ARMOR = 2;
	ITEM_TYPE_CONSUMABLE = 3;
	ITEM_TYPE_MATERIAL = 4;
}

enum WeaponType {
	WEAPON_TYPE_NONE = 0;
	WEAPON_TYPE_SWORD = 1;
	WEAPON_TYPE_BOW = 2;
}

enum ArmorType{
	ARMOR_TYPE_NONE = 0;
	ARMOR_TYPE_HELMET = 1;
	ARMOR_TYPE_ARMOR = 2;
	ARMOR_TYPE_BOOTS = 3;
}

enum ConsumableType{
	CONSUMABLE_TYPE_NONE = 0;
	CONSUMABLE_TYPE_POTION = 1;
}

enum MaterialType{
	MATERIAL_TYPE_NONE = 0;
	MATERIAL_TYPE_FOOD = 1;
}

message S_EnterGame {
  ObjectInfo player = 1;
  PlayerServerState serverState = 2;
}

message S_LeaveGame {
  
}

message S_Spawn {
  repeated ObjectInfo objects = 1;
}

message S_Despawn {
  repeated int32 objectId = 1;
}

message C_Move {
  PositionInfo position = 1;
}

message S_Move {
  int32 objectId = 1;
  PositionInfo position = 2;
}

message C_Skill {
  SkillInfo info = 1;
}

message S_Skill {
  int32 objectId = 1;
  SkillInfo info = 2;  
}

message S_ChangeHp {
  int32 objectId = 1;
  int32 hp = 2;
}

message S_Ping{
}

message C_Pong{
}

message S_Die{
  int32 objectId = 1;
  int32 attackerId = 2;
}

message S_Connected{
}

message C_Login{
  string uniqueId = 1;  
}

message S_Login{
  int32 loginOk = 1;
  repeated LobbyPlayerInfo players = 2;
}

message C_CreatePlayer{
	string name = 1;
}

message S_CreatePlayer{
	LobbyPlayerInfo player = 1;
}

message C_EnterGame{
	string name = 1;
}

message S_ItemList{
	repeated ItemInfo items = 1;
}

message S_AddItem{
	repeated ItemInfo items = 1;
}

message C_RequestShop{
}

message S_ShopList{
	repeated ItemInfo items = 1;
}

message C_EquipItem{
	int32 itemDbId = 1;
	bool equipped =2;
}

message S_EquipItem{
	int32 ItemDbId = 1;
	bool equipped = 2;
}

message C_BuyItem{
	int32 templateId = 1;
	int32 count = 2;
}

message S_BuyItem{
	int32 templateId = 1;
	int32 count = 2;
	int32 gold = 3;
}

message C_RemoveItem{
	int32 itemDbId = 1;
}

message S_ChangeStat{
	StatInfo statInfo = 1;
}

message S_ChangePosition{
	int32 objectId = 1;
	PositionInfo position = 2;
}

message C_ChangePosition{
}

message S_Tutorial {
  TutorialInfo tutorialInfo = 1;
}

message C_MapChange{
	int32 mapId = 1;
}

message S_MapChange{
	int32 mapId = 1;
	ObjectInfo objectInfo = 2;
}

message C_StartQuest{
	int32 templateId = 1;
}

message C_QuestComplete{
	int32 questDbId = 1;
}

message S_QuestList{
	repeated QuestInfo quests = 1;
}

message S_StartQuest{
	QuestInfo quest = 1;
}

message S_QuestComplete{
	QuestInfo quest = 1;
}

message LobbyPlayerInfo{
	int32 playerDbId = 1;
	string name = 2;
	StatInfo statInfo = 3;
}

message ObjectInfo {
  int32 objectId = 1;
  string name = 2;
  PositionInfo position = 3;
  StatInfo statInfo = 4;
  MapInfo mapInfo = 5;
}

message PositionInfo{
  CreatureState state = 1;
  MoveDir MoveDir = 2;
  LookDir LookDir = 3;
  int32 posX = 4;
  int32 posY = 5;
}

message StatInfo{
  int32 level = 1;
  int32 hp = 2;
  int32 maxHp = 3;
  int32 attack = 4;
  float speed = 5;
  int32 totalExp = 6;
  int32 gold = 7;
}

message QuestInfo
{
  int32 questDbId = 1;
  int32 templateId = 2;
  int32 progress = 3;
  int32 connection = 4;
  bool completed = 5;
  string questType = 6;
  RewardInfo rewards = 7;
}

message RewardInfo
{
  RewardType rewardType = 1;
  int32 rewardValue = 2;
}

message SkillInfo{
  int32 skillId = 1;
}

message ItemInfo{
	int32 ItemDbId = 1;
	int32 templateId = 2;
	int32 count = 3;
	int32 slot = 4;
	bool equipped = 5;
	int32 price = 6;
}

message MapInfo{
	int32 mapDbId = 1;
	int32 templateId = 2;
	string mapName = 3;
	int32 portalId = 4;
	string scene = 5;
}

message TutorialInfo {
  int32 tutorialId = 1;  
}



